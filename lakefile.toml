name = "weak-simplex-conjecture-lean"
version = "0.1.0"
keywords = ["math", "probability", "gaussian", "formalization"]
defaultTargets = ["WeakSimplexConjectureLean"]

[leanOptions]
autoImplicit = false
relaxedAutoImplicit = false
pp.unicode.fun = true
weak.linter.mathlibStandardSet = true

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "WeakSimplexConjectureLean"
