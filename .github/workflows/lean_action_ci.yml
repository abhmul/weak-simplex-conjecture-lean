name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          build: true
          build-args: "--wfail"
          test: false

      - name: Compile the public root
        run: lake env lean -DwarningAsError=true WeakSimplexConjectureLean.lean

      - name: Verify the axiom audit
        run: python3 scripts/check_axiom_audit.py

      - name: Generate the production import graph
        run: lake exe graph --to WeakSimplexConjectureLean "$RUNNER_TEMP/import_graph.dot"

      - name: Enforce trusted-source policy
        run: |
          python3 -m unittest discover -s scripts -p 'test_*.py'
          python3 scripts/audit_trusted_lean.py \
            --public-root WeakSimplexConjectureLean.lean \
            WeakSimplexConjectureLean WeakSimplexConjectureLean.lean

      - name: Check vendor entries in the provenance ledger
        shell: bash
        run: |
          test -f PROVENANCE.md
          while IFS= read -r -d '' vendor_file; do
            if ! awk -F '|' -v target="\`$vendor_file\`" '
              function trim(value) {
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
                return value
              }
              trim($2) == target {
                found = 1
                for (column = 3; column <= 9; column++) {
                  value = trim($column)
                  if (value == "" || value == "-" || value == "—") bad = 1
                }
              }
              END { exit (found && !bad) ? 0 : 1 }
            ' PROVENANCE.md; then
              echo "Missing or incomplete provenance entry for $vendor_file"
              exit 1
            fi
          done < <(find WeakSimplexConjectureLean/Vendor \( -type f -o -type l \) \
            ! -path 'WeakSimplexConjectureLean/Vendor/README.md' -print0)
