# Project-scoped Codex configuration for this checkout. The checkout must be trusted in
# `~/.codex/config.toml` before Codex will load this file.
# Codex does not shell-expand `~` in an MCP server's `cwd`; keep these paths absolute.

[mcp_servers.lean-lsp]
command = "/home/abhmul/.local/bin/uvx"
args = [
  "--from",
  "lean-lsp-mcp==0.28.1",
  "lean-lsp-mcp",
  "--transport",
  "stdio",
  "--lean-project-path",
  "/home/abhmul/dev/weak-simplex-conjecture-lean",
]
cwd = "/home/abhmul/dev/weak-simplex-conjecture-lean"
enabled = true
required = true
startup_timeout_sec = 30
tool_timeout_sec = 180
default_tools_approval_mode = "approve"
enabled_tools = [
  "lean_goal",
  "lean_hover_info",
  "lean_local_search",
  "lean_leanfinder",
  "lean_leansearch",
  "lean_loogle",
  "lean_hammer_premise",
  "lean_state_search",
  "lean_multi_attempt",
  "lean_diagnostic_messages",
  "lean_code_actions",
]
